  - id: B001
    resolution: >
      plugin_build_features, run_model, build_features_traced removed.
      execute(canonical, context) is the single authoritative path calling
      self.build_features() (concrete method) and self.run_inference()
      exactly once.  _emit_inference_events emits only from pre-computed
      result.  Verified by grep (methods absent), test suite, and
      orchestrator code inspection.
  - id: B002
    resolution: >
      Showcase mode implemented in workspace_ui.py as
      /demo/workspace?view=showcase.  Includes: visual pipeline (semantic
      <ol> with 7 distinct states), stage detail drawer (per-stage
      allowlisted metadata, Escape close, focus restoration), Bremen
      decision visualization (score/threshold, NOT CERTIFIED flag,
      no diagnosis), workflow cards (dynamic, unknown-workflow fallback),
      process-panel linkage (bidirectional event-stage navigation),
      accessibility (keyboard nav, aria-live, reduced motion, responsive),
      investor summary (technical readiness separate from scientific
      certification).  Uses real job API and real SSE — no mock data,
      no fake timers, no static embedded job.
  - id: W001-W003
    resolution: >
      Event budget documented in workspace_contract.md (Bremen ~22-26,
      Nova ~6, Aramis ~4, limit 1000).  Duplicate inference eliminated.
      Orchestrator context wiring confirmed.  All previous deferred-scope
      warnings closed.
  - id: W004
    resolution: >
      Hardcoded provider.workflow_id == "aramis" check replaced with
      generic provider.readiness().model_ready check for ALL providers.
      Verified by grep (no 'aramis' string in orchestrator execution
      path).  Behavioral test with SyntheticUnavailableProvider proves
      generic handling without workflow-ID knowledge.

