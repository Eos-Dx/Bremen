summary: |
  PLAN verified against all designer clarifications. BREMEN_DESIGN_SPEC_v1.md is
  acknowledged as the visual source of truth to be committed under docs/design/
  during this PR. All design tokens are locked: 6 base colors (#F7F8F8, #FFFFFF,
  #16202A, #5B6570, #1F6F6B, #E3E7E6), 4 status colors (#2E7D5B, #B8894A,
  #9AA3A8, #C1483D), 3 tint colors (#F1F5F4, #FBF3E9, #FBEEEC). No GitHub
  palette, no additional colors, no gradients. Typography uses exactly 6 sizes
  (32, 22, 17, 14, 13, 11). Spacing uses 8 values (4, 8, 12, 16, 24, 32, 48,
  64). Cards 10px radius, pills 999px, Start button 10px. Only two approved
  rgba(22,32,42) shadow values. 3px card rails, 2px event/history rails. 16px
  field/value gap. Disabled card content opacity reduced, status rail full
  opacity. Live Events 120px fixed empty state, flex-grow expansion. Model
  contract is real PR0082a model_id only -- no ModelVariant, model_variant_id,
  list_model_variants, workflow model endpoints, promotion, comparison, or
  PR0085. Technical Trace exposes only safe stage metadata. No BREMEN_MODEL_URI,
  S3 URIs, bucket names, object keys, environment values, or local paths. No
  filename-based container filtering. No sensitivity, specificity, fabricated
  reliability, or data-quality captions. Page ownership explicit: start_page_ui
  owns /demo, control_room_ui owns /demo/control-room, report_ui owns
  /demo/report/{job_id}, workspace_ui is legacy, server.py minimal dispatch.
  Route dispatch ordering defined to prevent conflicts. Testing requires
  executable browser behavior with Node harness, plus mechanical validation
  for hex values, shadow values, race/ethnicity scan, no npm/framework, and no
  model identity from BREMEN_MODEL_URI. Four non-blocking warnings.
