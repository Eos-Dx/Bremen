warnings:
  - id: W001
    evidence:
      file: .project-memory/pr/0082b-control-room-product-redesign/PLAN.md
      lines: Control Room - Live Events section
    issue: The Live Events empty state uses fixed height 120px, not min-height. The parent flex container must enable flex-grow expansion when events arrive. The PLAN correctly specifies this but implementation must ensure no layout shift occurs when transitioning from 120px fixed to expanded.
    recommendation: Use height: 120px on the collapsed event container within a flex column where the event list has flex-grow: 1. Verify zero layout shift when the first event arrives.

  - id: W002
    evidence:
      file: .project-memory/pr/0082b-control-room-product-redesign/PLAN.md
      lines: Container catalog section
    issue: The PLAN states server-side validation is the only gate for containers. No frontend filename-pattern filtering may exist. Unsupported extensions, missing objects, and oversize conditions are server-rejected errors, not frontend decisions.
    recommendation: Verify the control room frontend JavaScript does not inspect filename extensions or patterns for the container catalog. Only server-provided workflow_id filtering is permitted (from source_registry).

  - id: W003
    evidence:
      file: .project-memory/pr/0082b-control-room-product-redesign/PLAN.md
      lines: Testing section
    issue: Mechanical validation testing should include whole-word race and ethnicity scanning of all rendered text, approved hex value validation, approved rgba shadow value validation, check for no package.json or npm dependencies, and verification that no model identity (model_id) is derived from BREMEN_MODEL_URI. The PLAN's testing section does not explicitly enumerate these mechanical checks.
    recommendation: Add mechanical validation assertions to the test suite: scan rendered HTML for prohibited hex values, verify only the two approved rgba shadow values, verify whole-word race/ethnicity prohibited terms absent, verify no package.json or frontend framework exists, verify model_id originates from GET /demo/api/models not from environment variable parsing.

  - id: W004
    evidence:
      file: .project-memory/pr/0082b-control-room-product-redesign/PLAN.md
      lines: DESIGN SPEC COMMIT section
    issue: BREMEN_DESIGN_SPEC_v1.md is planned to be committed under docs/design/ during this PR but does not currently exist. The PLAN correctly states it is the authoritative source and will be committed. Implementation must not begin until the design spec is committed and all token values verified against it.
    recommendation: Commit BREMEN_DESIGN_SPEC_v1.md as the first file of the PR implementation. Verify all PLAN tokens match the committed spec before implementing any UI component.

