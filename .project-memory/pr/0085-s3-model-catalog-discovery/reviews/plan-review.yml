blockers: []

warnings:
  - id: W001
    evidence:
      file: .project-memory/pr/0085-s3-model-catalog-discovery/PLAN.md
      lines: Discovery pipeline step 2
    issue: The PLAN describes two different approaches for candidate manifest discovery (common prefixes with delimiter, then a better approach with no delimiter and key filtering). The implementation must choose one consistent approach.
    recommendation: Use the second approach (list with no delimiter, filter for keys ending in /manifest.json at depth prefix + one directory level). This avoids AWS S3 delimiter inconsistencies and provides deterministic results.

  - id: W002
    evidence:
      file: .project-memory/pr/0085-s3-model-catalog-discovery/PLAN.md
      lines: Model registry immutable section
    issue: The PLAN states the registry is immutable after initialization. However, the legacy migration path (ModelState -> registry) requires building the registry after ModelState.load_at_startup() completes. The registry snapshot is only immutable after the bootstrap function returns. During the brief initialization window, the registry is being populated. This is acceptable since initialization is single-threaded at startup before any request handlers run.
    recommendation: Document that the registry is mutable during the initialization phase (server startup, before serve_forever) and immutable after the bootstrap function returns. No locking needed for reads after initialization.

  - id: W003
    evidence:
      file: .project-memory/pr/0085-s3-model-catalog-discovery/PLAN.md
      lines: Expected files - src/bremen/api/workflow_bremen.py
    issue: The PLAN adds model_id parameter to BremenProvider.__init__. The provider is also instantiated in test fixtures (test_workflow_bremen.py, test_runtime_plugin.py). Existing tests that construct BremenProvider() without arguments must continue to work.
    recommendation: Ensure model_id defaults to None for backward compatibility. Existing tests must pass unchanged.

