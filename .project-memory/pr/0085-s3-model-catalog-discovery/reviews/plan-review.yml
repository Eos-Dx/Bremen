summary: |
  PLAN verified against all 19 blocking review gates. The plan delivers true
  per-job selected-model execution by introducing an S3-discovered multi-model
  catalog and an immutable process-local registry. The execution binding is
  explicit: get_provider_for_model(model_id) reads the registry to get the
  specific entry's private package and constructs a BremenProvider with it.
  An acceptance test with two distinct synthetic packages producing distinct
  outputs is required. Configuration uses exactly BREMEN_MODEL_CATALOG_URI
  accepting one S3 prefix URI. Catalog mode takes precedence over legacy
  BREMEN_MODEL_URI with a safe startup warning. Legacy mode is unchanged when
  catalog URI is absent. S3 layout, manifest contract, discovery pipeline,
  failure policy, duplicate policy, registry architecture, privacy, thread
  safety, health, model-version semantics, and scope boundaries are all
  explicitly specified with exact contracts. No unresolved implementation
  decisions require the coder to invent behavior. Three non-blocking warnings
  about discovery approach ambiguity, registry initialization window, and
  provider backward compatibility.
