  source_identity:
    status: implemented
    details: |
      S3 catalog source_ids are server-generated opaque UUIDs. The browser
      receives and transmits only the opaque token. The server maintains a
      mapping from source_id to bucket/object-key/prefix. Resolution
      validates: existence, expiry (>1 hour), bucket match against current
      config, prefix match, consumption state, and extension (.h5/.hdf5).
      Unknown, stale, expired, tampered (wrong bucket/prefix), consumed,
      oversized, unsupported extension, and out-of-prefix sources are
      rejected with typed safe errors. Upload identity is also opaque
      (UUID). All behavioral tests pass.
    passing: true

  source_revalidation:
    status: implemented
    details: |
