  selection_refresh:
    status: implemented
    details: |
      Catalog refresh preserves visible selection. After re-rendering the
      container list, the 'selected' class is re-applied to the previously
      selected item if it still exists. If the item disappeared from the
      refreshed list, the selection is not visually applied, and the
      server-side revalidation at job submission returns "The selected source
      is no longer available."
    passing: true

  upload_cleanup:
