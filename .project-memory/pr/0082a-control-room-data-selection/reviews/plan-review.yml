blockers:
  - id: B001
    severity: blocker
    evidence:
      file: .project-memory/pr/0082a-control-room-data-selection/PLAN.md
      lines: Source identity section
    issue: |
      Source identity for S3 catalog objects uses the existing S3 key (the id
      field from GET /demo/api/h5/containers) as source_id. The PLAN states the
      the browser selects a container by its id, sends it as source_id, and the
      server reconstructs s3://{bucket}/{prefix}{source_id}. This is not opaque.
      The browser receives and submits a reversible storage identifier (the S3
      key), not a server-generated opaque token.
    required_change: |
      Replace the S3-key-as-source_id design with a server-generated opaque
      source_id created at selection time. The browser must receive and submit
      only the opaque source_id. The server must maintain a server-side mapping
      from source_id to bucket/object-key pair, revalidate at job submission
      against current bucket and prefix configuration, and reject unknown,
      stale, tampered, or expired identifiers. The S3 key must not leave the
      server in any new public Control Room contract.

  - id: B002
    severity: blocker
    evidence:
      file: .project-memory/pr/0082a-control-room-data-selection/PLAN.md
      lines: Upload path section and backward compatibility section
    issue: |
      The PLAN preserves h5_path in the POST /demo/api/stage response
      ("response extended with upload_id, h5_path kept for compat") and in the
      POST /demo/api/jobs request body ("existing h5_path and container_id
      fields preserved as legacy compat inputs"). The new Control Room upload
      contract must return upload_id and safe metadata only. It must not return
      a filesystem path (h5_path) to the browser in any new response. The new
      Control Room JavaScript must use upload_id exclusively.
    required_change: |
      Remove h5_path from the new POST /demo/api/stage response. The new
      Control Room contract returns only status, upload_id, filename,
      size_bytes, request_id, technical_demo_only. Preserve legacy
      compatibility through one explicit isolated mechanism: the existing
      legacy route retained without changes (the old /demo page still calls
      an internal endpoint that may return h5_path), or a versioned legacy
      response path, or an internal adapter used only by old server-side
      callers. The new POST /demo/api/jobs must not accept h5_path from the
      browser for the new Control Room path. Legacy h5_path in the job
      request may be preserved only as an isolated backward-compatibility
      input that is explicitly routed through the legacy path, not the new
      secure source-resolution path.

  - id: B003
    severity: blocker
    evidence:
      file: .project-memory/pr/0082a-control-room-data-selection/PLAN.md
      lines: Model catalog design and model selection contract
    issue: |
      The model catalog response schema (GET /demo/api/models) does not
      include catalog_timestamp, catalog_version, or equivalent revision
      metadata. The correction requires catalog freshness metadata so the
      frontend can reason about staleness of the displayed catalog state.
      Without a timestamp, the frontend cannot determine whether the catalog
      reflects current server state or needs refresh.
    required_change: |
      Add catalog_timestamp (ISO-8601 UTC) or catalog_version (monotonic
      integer) to the GET /demo/api/models response. The frontend should
      display the timestamp and use it to inform the user when the catalog
      may be stale. Server-side revalidation at job submission must remain
      authoritative regardless of frontend timestamp.

warnings:
  - id: W001
    evidence:
      file: .project-memory/pr/0082a-control-room-data-selection/PLAN.md
      lines: Core interface changes
    issue: The plan modifies workflow_provider.py execute() signature, workflow_orchestrator.py run_workflow_request(), and workflow_bremen.py to accept and propagate model_id.
    recommendation: Ensure model_id is added as optional keyword argument defaulting to None on all modified signatures so existing internal callers without model_id preserve current behavior when exactly one valid model is configured. Existing calls without model_id when zero or multiple models are available must fail closed (typed error, no ambiguous execution).

  - id: W002
    evidence:
      file: .project-memory/pr/0082a-control-room-data-selection/PLAN.md
      lines: Isolated legacy upload path
    issue: The plan must isolate legacy h5_path upload compatibility through a separate mechanism, not by embedding it in the new Control Room response.
    recommendation: The existing legacy POST /demo/api/stage endpoint (before this PR's changes) returns h5_path. Preserve that exact endpoint at a distinct route (e.g., keep the current route handling for non-Control-Room callers) while the new Control Room uses a contract that never exposes h5_path. The existing /demo/api/h5/analyze legacy endpoint that uses container_id also remains as an isolated backward-compatible path.

  - id: W003
    evidence:
      file: .project-memory/pr/0082a-control-room-data-selection/PLAN.md
      lines: Model configuration section
    issue: The plan says "No structured multi-model configuration mechanism is added" and describes the catalog as single-model only. The correction requires the catalog contract to support zero, one, or multiple real configured Bremen models.
    recommendation: The ModelEntry list schema already supports multiple entries. Clarify that the build_model_catalog() function reads from ModelState for the legacy single-model case but the catalog endpoint contract (list of ModelEntry with model_id, availability, etc.) is designed to support multiple real configured models from any future configuration source. The architecture must not permanently constrain the catalog to a singleton ModelState. Model IDs must be stable. Duplicate model IDs must be rejected. Only technically real configured models are returned. No fabricated models.

  - id: W004
    evidence:
      file: .project-memory/pr/0082a-control-room-data-selection/PLAN.md
      lines: Catalog freshness
    issue: The plan relies on the catalog being rebuilt on every call and revalidation at job submission, which is correct, but without catalog_timestamp the frontend cannot distinguish a fresh catalog from a stale one.
    recommendation: Once catalog_timestamp is added to resolve blocker B003, the frontend should show the timestamp and allow the user to refresh before submission. The server revalidation at submission remains authoritative regardless.

  - id: W005
    evidence:
      file: .project-memory/pr/0082a-control-room-data-selection/PLAN.md
      lines: Source identity section
    issue: The plan correctly describes opaque upload_id for uploads. The upload_id pattern (server-generated UUID, stored server-side, never exposes temp path) satisfies the opaque identity requirement for uploaded files. This pattern should be replicated for S3 catalog objects with an opaque source_id server-generated at selection time rather than using the S3 key directly.
    recommendation: Apply the same opaque-token pattern used for upload_id to source_id for S3 catalog objects. When the user selects a container, the server creates a source_id (UUID), stores the mapping to the S3 bucket/key pair, and returns only the source_id to the browser.

