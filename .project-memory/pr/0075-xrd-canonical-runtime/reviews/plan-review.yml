warnings:
  - id: W001
    evidence:
      file: PLAN.md
      lines: 316-337
    issue: "Aramis integration mode selection (A/B/C) is deferred to implementation with preference for Option A. This is architecturally sound but the plan provides no boundary tests or timeout specifications for the chosen mode. The CI/CD pipeline lacks gates for subprocess/container health if Option B or C is selected."
    recommendation: "Add timeout specifications and lifecycle contracts for each integration mode option before implementation."
  - id: W002
    evidence:
      file: PLAN.md
      lines: 270-276
    issue: "The spike patch adds a fallback side resolution from dataset name when no attribute is found. The plan states 'Never silently infer side from filenames' which is distinct from dataset-name inference, but the spike introduces fallback logic that could mask missing organSide attributes."
    recommendation: "Ensure the dataset-name fallback logs a warning when activated so operators can detect metadata gaps. The plan should clarify that filename-based inference is prohibited; dataset-name fallback is acceptable only as a documented intermediate step."
  - id: W003
    evidence:
      file: src/bremen/api/h5_layouts.py
      lines: 902-909
    issue: "Current MatadorRawH5Adapter rejects multiple complete bilateral pairs with H5ContainerError. The spike patch changes this to retain all pairs. This is a planned behavioral change but the existing tests (test_ambiguous_multiple_complete_pairs_fails) expect the old rejection behavior and will need updating."
    recommendation: "Ensure the spike-patch test changes are included in the implementation sequence and that no regression affects single-pair inputs."
  - id: W004
    evidence:
      file: PLAN.md
      lines: 376-381
    issue: "Bremen scientific parity tolerances are marked TBD based on training-pipeline output. Without defined tolerances, the scientific certification gate cannot be verified by automated tests."
    recommendation: "Define numerical tolerances before the scientific certification step is executed. Until then, the readiness.scientifically_certified flag must remain False for Bremen."

