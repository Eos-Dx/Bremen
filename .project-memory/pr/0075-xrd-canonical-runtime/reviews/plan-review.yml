summary: >
  PLAN.md provides a safe, bounded, implementable transition from the existing
  Bremen-specific runtime to a canonical XRD multi-workflow platform with
  independent Bremen and Aramis providers.  All required architecture layers
  are separated: H5 layout adaptation, canonical XRD representation,
  workflow-specific preprocessing, workflow-specific features, and
  workflow-specific model inference are clearly delineated.  The canonical
  XRD representation (CanonicalXRDCase/CanonicalXRDMeasurement) is
  scientifically neutral — q and intensity remain separate, no patient
  identifiers, no workflow-specific normalization applied in the shared
  layer.  The workflow registry is extensible (dict-based, not hardcoded
  if/elif), preventing a two-branch design.  Bremen and Aramis providers
  are fully isolated with no cross-imports.  Model state is per-workflow,
  with checksum-before-load guarantees and cross-workflow model rejection.
  No ensemble behavior, no automatic "run all", no shared verdict, no
  probability averaging.  Partial success is defined with a clear
  MultiWorkflowResult envelope.  Readiness is per-workflow with separate
  platform, normalization, and workflow states.  The existing CI/CD
  pipeline is reused with minimal additions; existing Bremen endpoints
  are preserved.  Migration is incremental — existing run_inference is
  not replaced, new types are additive.  Non-blocking concerns include
  unspecified Aramis integration timeout/lifecycle contracts, a spike-patch
  dataset-name side fallback that should log warnings, pending test
  migration for multiple-pair acceptance, and undefined Bremen parity
  tolerances that will gate scientific certification.  No blockers found.
