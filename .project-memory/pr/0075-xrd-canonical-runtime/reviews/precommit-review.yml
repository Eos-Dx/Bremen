summary: >
  PR 0075 implements the canonical XRD multi-workflow runtime foundation as specified
  in PLAN.md at commit 822b6e2. Architecture layers are properly separated:
  H5 adaptation → canonical XRD normalization → workflow provider → workflow features
  → workflow model inference. CanonicalXRDMeasurement keeps q and intensity separate,
  validated, and workflow-neutral. No sqrt(i²+q²) in canonical layer. The WorkflowRegistry
  is dict-based (not if/elif), supporting extensible registration. BremenProvider is a
  first-class provider owning its feature schema and model; AramisProvider is a scaffold
  returning workflow_unavailable. Per-workflow model state, checksum-before-load, typed
  failures, partial-success envelope, and per-workflow readiness are all implemented.
  No cross-workflow model acceptance. No ensemble behavior. No cross-imports between
  providers. Existing endpoints, run_inference, and ModelState singleton are preserved
  for backward compatibility. W001/W002/W003/W004 are resolved per plan-review expectations.
  All 1495 tests pass. No forbidden artifacts, no committed private data, no unsafe loading.

