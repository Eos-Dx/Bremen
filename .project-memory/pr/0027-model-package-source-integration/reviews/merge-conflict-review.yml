3. **`tests/test_bremen_api_server.py` uses `urllib.request` stdlib in test client.** The module docstring contains the word "urllib" (matched by the forbidden-pattern grep) and the file imports `from urllib.request import Request, urlopen` and `from urllib.error import HTTPError` (stdlib HTTP client used to make real requests against the in-process server). This is stdlib (not `requests`/`httpx`/boto3) and is the standard pattern for testing an in-process `http.server`. Pre-existing pattern in PR 0026 test scaffolding; not a network-client dependency.

4. **Pre-existing joblib use in non-conflict files.** The joblib/pickle grep in the four specified conflict files did not produce any direct hits — all `joblib` and `joblib.load` references in `src/bremen/api/model_state.py`, `src/bremen/api/server.py::_load_synthetic_model`, and test fixtures come from origin/main and the test scaffolding. None are introduced by PR 0027's source-resolution work.

5. **`app.py` AST no longer free of `h5_inputs`/`inference_handler` references.** The conflict-repaired `app.py` imports `from ..h5_inputs import stage_h5_input` and `from .inference_handler import run_inference`. These are origin/main additions merged in. Not in PR 0027's source-resolution scope; preserved per the merge's `handle_submit_prediction` integration requirement.

