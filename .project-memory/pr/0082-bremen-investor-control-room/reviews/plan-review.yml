summary: |
  PLAN.md for PR0082 presents a thorough, well-grounded plan for replacing the
  current /demo route with a real-time Investor Control Room. It is fully
  grounded in current committed source code (server.py routes, demo_ui.py,
  workspace_ui.py, job_api_handler.py, decision_contract.py, event_store.py,
  event_schema.py, runtime_plugin.py, etc.). The plan preserves all existing
  API routes, keeps /demo/workspace accessible for backward compatibility,
  uses exactly one real Bremen model from ModelState with no selector, traces
  a complete real execution path from browser action through SSE event delivery
  to decision and report creation, enforces PR0081 canonical decision vocabulary,
  separates technical readiness from scientific certification, specifies
  explicit frontend state transitions, bounds DOM growth at 200 events,
  requires behavioral tests for all key interactions, and clearly walls off
  PR0083, PR0084, and PR0085 scope. No blockers found. Three non-blocking
  warnings identified regarding visual stage grouping alignment with
  BREMEN_STAGE_ORDER, legacy API migration visibility, and unconfigured model
  state UX.
