source_inventory:
  default_route: GET /demo dispatched by do_GET to _handle_demo_route in server.py which calls build_demo_html_page from demo_ui.py
  workspace_ui: GET /demo/workspace and /demo/workspace/{job_id} dispatched by _handle_workspace_route, uses workspace_ui.py build_workspace_page
  showcase_ui: ?view=showcase query parameter detected by JS in workspace_ui.py _SHOWCASE_JS block
  job_api: POST /demo/api/jobs -> _handle_demo_jobs_create -> handle_jobs_create in job_api_handler.py; GET /demo/api/jobs -> handle_jobs_list
  workflow_execution: run_workflow_request in workflow_orchestrator.py, dispatching to BremenProvider.execute
  event_history: GET /demo/api/jobs/{job_id}/events -> handle_job_events in job_api_handler.py, reads from BoundedEventStore
  sse: GET /demo/api/jobs/{job_id}/events/stream -> handle_job_events_stream, uses BoundedEventStore with Condition wait
  report_api: GET /demo/api/jobs/{job_id}/reports/{workflow_id} -> handle_job_report in job_api_handler.py, dispatches to BremenReportProvider
  readiness: GET /health returns model_ready field; GET /model/version returns model_status field; ModelState.is_ready()
  decision_contract: decision_contract.py defines CONTINUE_MRI / MRI_REVIEW_DEFER, bremen_mri_continuation_threshold, v0.1.0, build_decision()

