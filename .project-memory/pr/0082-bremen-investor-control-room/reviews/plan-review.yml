warnings:
  - id: W001
    evidence:
      file: .project-memory/pr/0082-bremen-investor-control-room/PLAN.md
      lines: plan pipeline section
    issue: Plan's 10 visual pipeline stages do not exactly match the existing BREMEN_STAGE_ORDER (11 items) from runtime_plugin.py. The plan defines its own user-facing stage grouping (e.g. "Source validated", "Canonical XRD created") that differ from the internal stage IDs (artifact_verification, artifact_loaded, etc.)
    recommendation: Clarify that the 10-stage visual pipeline is a user-facing grouping of authoritative events, not a replacement of BREMEN_STAGE_ORDER. Confirm the internal lifecycle state machine remains unchanged.
  - id: W002
    evidence:
      file: .project-memory/pr/0082-bremen-investor-control-room/PLAN.md
      lines: warn section
    issue: Jobs created via the old /demo/api/h5/analyze endpoint bypass the structured _jobs store and will not appear in the Control Room job list. The plan acknowledges this and documents it in workspace_contract.md updates, which is acceptable but may surprise operators migrating from the old UI.
    recommendation: Document this migration limitation prominently so operators understand that historical jobs from the old analyze endpoint are not visible in the new Control Room.
  - id: W003
    evidence:
      file: .project-memory/pr/0082-bremen-investor-control-room/PLAN.md
      lines: full plan
    issue: The plan relies on the configured BREMEN_MODEL_URI being available at deployment time. If unset, the Control Room shows an informative message rather than a full execution experience. This is acknowledged as acceptable demo behavior but could be confusing if the Control Room is shown as the default route without a ready model.
    recommendation: Consider adding a visible indicator when model is not_configured that guides operators to set BREMEN_MODEL_URI, rather than showing a non-functional Analyze button.

