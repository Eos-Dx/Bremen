## DEMO SMOKE CHECK

**Result: pass**

PLAN.md requires a practical runnable smoke/demo mechanism: `python -m bremen demo-smoke --base-url http://...`. This:
- Exercises a running service via HTTP.
- Works for local (`127.0.0.1:8000`) and deployed (App Runner/ECS) URLs.
- No AWS credentials required — stdlib `urllib.request` only.
- Prediction check skips gracefully with `"not_available"` when no local H5 fixture.
- Outputs JSON summary with `overall: "pass"|"partial"|"fail"`.

