resolved_warnings:
  - id: deferred-test-files
    resolution: >
      Both test_bremen_event_stream.py (36 tests) and
      test_bremen_workspace_ui.py (25 tests) are now committed and
      pass.  They exercise event schema, bounded store, concurrency,
      SSE prompt delivery, module reload, privacy, workspace route,
      job API, report API, and accessibility.
  - id: missing-workspace-contract-doc
    resolution: >
      docs/workspace_contract.md is committed.  It documents all
      API endpoints, event schema, SSE contract with Condition-based
      delivery, ephemeral retention, process/technical modes, report
      lifecycles, privacy allowlists, limitations, and accessibility.
  - id: workflow-provider-dead-event-code
    resolution: >
      The dead helpers (_emit_to_store, _emit_model_validation_event)
      were removed from workflow_bremen.py.  execute() no longer
      accepts an event_store parameter.  All structured events are
      emitted exclusively by the orchestrator with valid job_id and
      request_id.  The docstring explicitly states this design.
  - id: sse-polling-not-push
    resolution: >
      Event store now uses threading.Condition (not busy polling).
      BoundedEventStore.wait_for_events() blocks efficiently using
      condition.wait(timeout=15).  Append calls condition.notify_all()
      so SSE streams wake immediately when new events arrive.  The
      heartbeat keepalive only fires if no events arrive within the
      full 15-second window.  A behavioural test (test_new_event_notified_quickly)
      verifies sub-second delivery latency.

