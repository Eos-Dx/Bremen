summary: >
  Plan PR0077 is approved. It creates a safe, bounded, extensible user-facing
  analysis workspace around the existing multi-workflow runtime. Every claim
  about the current state of the codebase is verified:
  (1) VALIDATE: SUCCESS at workflow_bremen.py:310 — confirmed;
  (2) No event_store, event_schema, job_models, SSE, report_provider, or
  workspace_ui files exist — confirmed by grep;
  (3) Existing structured events (runtime.*, bremen.h5_input.*,
  bremen.prediction.*) are application log lines, not a user-facing job
  event model — confirmed by inspection of workflow_orchestrator.py, server.py,
  h5_inputs.py, inference_handler.py;
  (4) No AnalysisJob, WorkflowRun, ReportEnvelope, EventSource, BoundedEventStore
  references exist in src/ or tests/ — confirmed by grep;
  (5) build_decision_support_report exists at decision_support.py:48 — confirmed.
  The plan defines a complete job model, versioned event schema, bounded
  in-memory store, SSE contract, separate report architecture for Bremen and
  Aramis, accessible frontend workspace, privacy zones with allowlists,
  recursion safeguard, roadmap update, and comprehensive tests. Scientific
  boundaries are preserved — no fabricated Aramis content, no combined verdict,
  no diagnosis claims, no clinician-replacement language, scientifically_certified
  flag visible. Scope is focused on observability, reports, and frontend
  presentation with no redesign of existing scientific infrastructure.
