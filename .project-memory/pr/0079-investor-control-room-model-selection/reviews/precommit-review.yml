summary: >
  PR0079 implements the concurrent demo server foundation for multi-client
  SSE safety.  _ThreadingHTTPServer (ThreadingMixIn + HTTPServer with
  daemon_threads=True) replaces the single-threaded HTTPServer.  Shared
  state is fully locked: _jobs_lock protects the jobs dict (write/create
  under lock, snapshot on read, never held during model execution or
  network writes), _providers_lock protects report provider init, and
  InMemoryJobStore now has an internal threading.Lock (W001 resolved).
  Singleton first-access uses double-checked locking with package-stored
  init lock.  Module reload preserves store, jobs dict, and lock identity
  on the bremen package.  BoundedEventStore is authoritative and already
  thread-safe.  ModelState is read-only after startup.  Providers are
  created fresh per registry call.  No provider-local inference lock is
  needed.  19 behavioral tests prove two real SSE clients connecting
  simultaneously, health and job API responsive during SSE, disconnect
  isolation, clean shutdown, concurrent job creation, singleton race
  safety, module reload, and InMemoryJobStore thread safety.  All 1625
  pre-existing tests pass without modification.  Full suite: 1644 passed,
  11 skipped, 0 failures.  Resource assumptions documented.  PR0080 and
  PR0081 boundaries documented.  No UI, model catalog, model selection,
  or model-run scope creep.
