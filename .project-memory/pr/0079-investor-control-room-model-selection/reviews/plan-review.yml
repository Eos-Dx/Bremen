summary: >
  The revised plan correctly identifies and scopes the verified server blocker:
  HTTPServer is single-threaded (line 1259 of server.py: `server = HTTPServer(...)`)
  and the SSE handler (`handle_job_events_stream`) keeps a blocking request open for
  up to 5 minutes with heartbeat intervals. One SSE connection blocks all other
  requests — health, job API, workspace, report endpoints all queue behind it.
  The plan replaces HTTPServer with ThreadingHTTPServer (daemon_threads=True) and
  performs a thorough shared-state audit. Key risks addressed: _jobs dict locking
  (lock on write/create, snapshot on read, never held during orchestration/SSE
  wait/network writes), singleton first-access race (double-checked locking pattern
  with lock stored on bremen package), _report_providers init race, SSE loop
  _jobs.get() lock guard, event store already thread-safe (Condition + Lock),
  ModelState read-only during inference, providers built fresh per registry call.
  Module reload preservation is confirmed through existing test pattern. Two-client
  SSE integration tests use real sockets on ephemeral ports. Resource bounds
  documented (thread-per-connection, ~8 MB/thread, ~400 MB for 50 SSE clients
  within 2 GB App Runner). Model/provider concurrency audited — no provider-local
  lock needed (read-only model_package, per-call providers, fresh per registry
  resolve). No API schema changes, no SSE protocol changes, no event schema changes.
  Scope strictly limited to concurrency — no UI, model catalog, model selection,
  or model-run schema. PR0080 (Investor Control Room) and PR0081 (Provider-Owned
  Variants) clearly scoped as deferred follow-ups. Multi-model forward architecture
  documented with independence guarantees. 17 acceptance gates cover all required
  aspects. One minor warning about InMemoryJobStore locking strategy not being
  fully detailed.
