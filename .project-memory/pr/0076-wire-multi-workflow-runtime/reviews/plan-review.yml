summary: >
  Plan PR0076 is approved. It correctly identifies the integration gap left by PR0075
  (WorkflowRegistry/BremenProvider/AramisProvider/CanonicalXRDCase not wired into
  public routes), provides a single authoritative runtime path via
  run_workflow_request() → WorkflowRegistry → provider, converts run_inference() to
  a legacy compatibility wrapper, adds adapt_model_package() inside the provider
  boundary with checksum-before-load, and tests all three workflow routes (Session,
  Nova, Aramis) at the route level with legacy-bypass assertions. Scientific
  boundaries are preserved — no P1/P2/P3 policy invention, no Nova inference
  readiness claim, no Aramis science reimplementation, no model training, no
  private artifacts. Scope is tightly bounded to the wiring integration.
