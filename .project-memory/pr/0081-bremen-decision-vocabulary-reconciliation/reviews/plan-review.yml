blockers: []

warnings:
  - id: W001
    severity: warning
    evidence:
      repository: bremen_runtime
      ref: 4c1e32fd8df02541ac9b04c6e509f858225aa13c
      file: src/bremen/api/lifecycle_contracts.py
      lines: 126-131
    issue: The plan proposes a new src/bremen/api/decision_contract.py as the single authoritative source for decision vocabulary. However, lifecycle_contracts.py already defines a DecisionOutput dataclass (lines 126-131) with decision_policy_id, decision_code, and scientifically_certified fields. If both exist, the runtime has two authoritative decision types. The relationship between the proposed BremenDecisionContract and the existing DecisionOutput must be documented: DecisionOutput is a downstream event projection, decision_contract.py is the vocabulary and policy source of truth. Without explicit documentation, a future contributor may treat DecisionOutput as the authoritative vocabulary source.
    recommendation: Document in the PLAN.md or in decision_contract.py itself that DecisionOutput (lifecycle_contracts.py) is an event projection of the decision contract, not an independent vocabulary source. Alternatively, extend DecisionOutput instead of creating a parallel type.
  - id: W002
    severity: warning
    evidence:
      repository: bremen_runtime
      ref: 4c1e32fd8df02541ac9b04c6e509f858225aa13c
      file: src/bremen/workspace_ui.py
      lines: 877
    issue: The workspace_ui.py renderBremenDecision function (in _SHOWCASE_JS at line 877) has a hardcoded comparison `(triage === 'MRI_RECOMMENDED' ? 'warn' : 'ready')` for CSS badge class selection. When the positive machine code changes from MRI_RECOMMENDED to CONTINUE_MRI, this comparison will always yield the negative branch (badge-ready / green). The plan mentions updating CSS class logic in workspace_ui.py but does not explicitly identify this specific line. The non-showcase renderJob and renderWorkflowCard functions also read triage_recommendation directly (lines 297, 747, 810).
    recommendation: Explicitly identify workspace_ui.py line 877's hardcoded MRI_RECOMMENDED comparison as a target for CSS class remapping. Ensure the non-showcase render paths (lines 297, 747, 810) also display the new decision_code or decision_display_name, not only triage_recommendation.
  - id: W003
    severity: warning
    evidence:
      repository: bremen_runtime
      ref: 4c1e32fd8df02541ac9b04c6e509f858225aa13c
      file: src/bremen/api/workflow_bremen.py
      lines: 277-291
    issue: The _emit_inference_events method at line 289 emits decision_code = triage in the runtime.decision.completed event. After this PR, the event will emit the canonical code (e.g., CONTINUE_MRI). The event schema version is NOT bumped. Downstream event consumers that treat the decision_code field value as having a fixed enumeration (e.g., MRI_RECOMMENDED | MRI_RULE_OUT) will break silently. The plan states the schema version is not bumped because the field name and structure are unchanged, but the valid value set changes.
    recommendation: Either bump the event schema version or document the enumeration change as a breaking but accepted deviation given the controlled demo environment. Add a test that verifies event consumers accept the new canonical values.

