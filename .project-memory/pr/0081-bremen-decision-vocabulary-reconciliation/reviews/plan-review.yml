summary: >
  The plan is grounded in independently verified source evidence. Training
  vocabulary (src/bremen/training/pipeline.py, src/bremen/modeling.py,
  config/training/bremen_v0_1_train.yaml) produces numerical output only
  -- probability, prediction 0/1, threshold -- with no decision vocabulary
  strings. The LABEL_MAP in modeling.py maps BENIGN to 0 and CANCER to 1
  for research-draft training only and is not used by runtime inference.
  Runtime vocabulary is defined in five source files (workflow_bremen.py,
  feature_artifact_prediction.py, inference_handler.py, decision_support.py,
  report_bremen.py) that hardcode TRIAGE_RECOMMENDED = MRI_RECOMMENDED and
  TRIAGE_RULE_OUT = MRI_RULE_OUT as string constants. MRI_RULE_OUT is
  traced to PR0039 planning (line 286) as a runtime-only construct never
  sourced from training labels or approved through a product decision gate.
  Class order (prediction=1 -> positive, prediction=0 -> negative) is
  implicit in the threshold comparison and confirmed stable. Threshold
  source is the portable_logreg.threshold float in the model package.
  The plan properly separates machine codes (recommended CONTINUE_MRI and
  MRI_REVIEW_DEFER) from display text (existing controlled language may be
  recommended / may not be indicated). Human approval gate requires explicit
  sign-off on positive machine code, negative machine code, display text,
  MRI_RULE_OUT compatibility treatment, and decision-policy ID/version.
  No numerical changes to inference, features, threshold, class order,
  or probability calculation. Backward compatibility via preserved
  triage_recommendation field (carrying canonical value during Phase 1)
  with legacy MRI_RULE_OUT mapped as a deprecated alias. PR0082 (Bremen
  Investor Control Room) explicitly blocked until vocabulary reconciliation
  is approved and implemented. Three non-blocking warnings documented:
  relationship between proposed decision_contract.py and existing
  DecisionOutput, hardcoded MRI_RECOMMENDED comparison in workspace_ui.py
  CSS logic, and event schema version policy when decision_code enumeration
  changes.
