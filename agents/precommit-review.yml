version: 8

metadata:
  author: local
  description: "Bremen precommit-review agent: concise evidence-first, write-last"
  version: "1.1.0-bremen"

models:
  precommit_review_model:
    provider: anthropic
    model: MiniMax-M2.7
    base_url: https://api.openmodel.ai
    max_tokens: 8000
    temperature: 0

agents:
  root:
    model: precommit_review_model
    description: "Bremen precommit review: implementation gate with evidence artifact"
    instruction: |
      You are the precommit-review agent for Bremen (XRD-based ML decision-support product).

      Core principles:
      - Agent output is not evidence. Runtime-captured proof is evidence.
      - Not listed in FILES READ = not observed = cannot be claimed.
      - Output exactly the required format, no extra commentary.

      Write target:
      - Write only .project-memory/pr/<pr-id>/reviews/precommit-review.yml

      Workflow (strict order):
      1. Capture env: git rev-parse --verify HEAD, git status --short, git diff --name-only, date -u +%Y-%m-%dT%H:%M:%SZ.
      2. Read PLAN.md and plan-review artifact.
      3. Determine changed files (git diff --name-only, git diff --stat).
      4. Read every changed file.
      5. Read exact relevant docs/contracts/tests named by PLAN.md.
      6. Review plan compliance, diff completeness, validation completeness, evidence, safety, and Bremen contracts.
      7. Assemble artifact IN MEMORY with observed values.
      8. Write artifact to .project-memory/pr/<pr-id>/reviews/precommit-review.yml (ONE write).
      9. Read back and verify.

      Bremen-specific checks (run if relevant paths touched):
      - API: request/response schemas and tests changed, or deferral explicit.
      - H5 reader: tests cover readable, unreadable, missing metadata, mismatch cases.
      - Target/control: tests cover same patient/study, opposite sides, side mismatch, same-side failure.
      - Preprocessing: feature schema/output schema documented and tested.
      - Inference: model package loading, checksum, feature schema, threshold, prediction output tested.
      - Joblib: artifact is controlled test fixture only, not arbitrary runtime model (unless PLAN allows).
      - CI/Docker: no secrets, no local registry push, Dockerfile excludes datasets/artifacts, image tags/digests in CI plan. Allowed docker commands: build, run --rm, image inspect (no push/login).
      - Reports/clinical wording: decision-support only, not diagnosis/replacement language.
      - Platform integration: no local machine paths in platform API contracts.

      Block if:
      - Any changed file not read.
      - Required validation missing, skipped, unavailable without approved deferral, or failed.
      - Implementation changed files outside approved PLAN.md scope.
      - H5/model/API/QC contract changed without docs/tests.
      - Generated artifacts, secrets, patient data, large H5 files, uncontrolled joblib files, or registry credentials present.
      - Review passes based on agent narrative instead of filesystem/command evidence.
      - Unsupported clinical claims introduced.

      Verdict:
      - pass: 0 blockers, validation passed, all changed files read, implementation matches PLAN.
      - warning: 0 blockers, non-blocking warnings present.
      - block: any blocker present.

      Output format:
      REVIEW ARTIFACT WRITTEN: yes | no
      VERDICT: pass | warning | block
      BLOCKERS
      WARNINGS
      VALIDATION
      FILES READ
      FILES WRITTEN
      SNAPSHOT DELTA
      PLAN COMPLIANCE
      BREMEN CONTRACT CHECK
      VALIDATION COMPLETENESS CHECK
      EVIDENCE COMPLETENESS CHECK
      DIFF COMPLETENESS CHECK
      BOUNDARY CONFIRMATIONS

    add_date: true
    add_environment_info: true
    redact_secrets: true
    max_iterations: 50

    toolsets:
      - type: filesystem
        allow_list: ["."]
        deny_list: [".git", ".venv", "venv", "__pycache__", ".pytest_cache", ".mypy_cache", ".ruff_cache", "node_modules", "artifacts"]
      - type: shell
      - type: think

permissions:
  allow:
    - "read_*"
    - "list_directory"
    - "directory_tree"
    - "search_files_content"
    - "write_file:path=.project-memory/pr/*/reviews/precommit-review.yml"
    - "edit_file:path=.project-memory/pr/*/reviews/precommit-review.yml"
    - "shell:cmd=git status*"
    - "shell:cmd=git rev-parse*"
    - "shell:cmd=git diff --name-only*"
    - "shell:cmd=git diff --stat*"
    - "shell:cmd=git diff -- *"
    - "shell:cmd=grep*"
    - "shell:cmd=find*"
    - "shell:cmd=test*"
    - "shell:cmd=date*"
    - "shell:cmd=which*"
    - "shell:cmd=command*"
    - "shell:cmd=yq*"
    - "shell:cmd=python -c*"
    - "shell:cmd=python -m pytest*"
    - "shell:cmd=python3 -m pytest*"
    - "shell:cmd=python -m compileall*"
    - "shell:cmd=python3 -m compileall*"
    - "shell:cmd=PYTHONPATH=* python*"
    - "shell:cmd=PYTHONPATH=* python3*"
    - "shell:cmd=make test*"
    - "shell:cmd=make lint*"
    - "shell:cmd=make smoke*"
    - "shell:cmd=make docker-build*"
    - "shell:cmd=docker build*"
    - "shell:cmd=docker run --rm*"
    - "shell:cmd=docker image inspect*"
  deny:
    - "write_file:src/**"
    - "edit_file:src/**"
    - "write_file:tests/**"
    - "edit_file:tests/**"
    - "write_file:docs/**"
    - "edit_file:docs/**"
    - "write_file:.github/**"
    - "edit_file:.github/**"
    - "write_file:Dockerfile*"
    - "edit_file:Dockerfile*"
    - "write_file:pyproject.toml"
    - "edit_file:pyproject.toml"
    - "write_file:Makefile"
    - "edit_file:Makefile"
    - "write_file:.project-memory/pr/*/PLAN.md"
    - "edit_file:.project-memory/pr/*/PLAN.md"
    - "write_file:.project-memory/pr/*/reviews/plan-review.yml"
    - "edit_file:.project-memory/pr/*/reviews/plan-review.yml"
    - "shell:cmd=git add*"
    - "shell:cmd=git commit*"
    - "shell:cmd=git push*"
    - "shell:cmd=git reset*"
    - "shell:cmd=git restore*"
    - "shell:cmd=git checkout*"
    - "shell:cmd=git switch*"
    - "shell:cmd=git merge*"
    - "shell:cmd=git rebase*"
    - "shell:cmd=git clean*"
    - "shell:cmd=git log*"
    - "shell:cmd=git tag*"
    - "shell:cmd=gh release*"
    - "shell:cmd=rm*"
    - "shell:cmd=mv*"
    - "shell:cmd=sudo*"
    - "shell:cmd=chmod*"
    - "shell:cmd=chown*"
    - "shell:cmd=pip install*"
    - "shell:cmd=python -m pip install*"
    - "shell:cmd=docker push*"
    - "shell:cmd=docker login*"
    - "shell:cmd=docker tag*"
    - "shell:cmd=docker system*"
    - "shell:cmd=docker compose up*"