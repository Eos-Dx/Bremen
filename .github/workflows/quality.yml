name: Bremen CI Quality

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Configure SSH for private dependency access
        run: |
          test -n "${{ secrets.BREMEN_CI_SSH_PRIVATE_KEY }}" || {
            echo "BREMEN_CI_SSH_PRIVATE_KEY secret is missing"
            false
          }

          mkdir -p ~/.ssh
          ssh-keyscan -t rsa github.com >> ~/.ssh/known_hosts
          cat > ~/.ssh/id_rsa <<< "${{ secrets.BREMEN_CI_SSH_PRIVATE_KEY }}"
          chmod 0600 ~/.ssh/id_rsa

      - name: Install Python dependencies
        env:
          GIT_SSH_COMMAND: "ssh -o StrictHostKeyChecking=accept-new"
        run: |
          python -m pip install --upgrade pip

          python -m pip install \
            "git+ssh://git@github.com/Eos-Dx/XRD-preprocessing.git"

          python -m pip install \
            "git+ssh://git@github.com/Eos-Dx/container.git@feat/v0_3-eoscan-session-container"

          python -m pip install .

      - name: Verify private dependency imports
        run: |
          python - <<'PY'
          import xrd_preprocessing
          import container
          from container.registry import VERSION_REGISTRY

          print("xrd_preprocessing import OK")
          print("container import OK")
          print("container supported versions:", sorted(VERSION_REGISTRY.keys()))

          assert "0_3" in VERSION_REGISTRY, "VERSION_REGISTRY must contain 0_3"
          print("VERSION_REGISTRY contains 0_3: OK")
          PY

      - name: Compile check
        run: python -m compileall src tests

      - name: Focused Bremen import identity test
        run: python -m pytest -q tests/test_bremen_import_identity.py

      - name: Full pytest suite
        run: python -m pytest -q

      - name: SonarQube Cloud scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: |
            -Dsonar.organization=eos-dx
            -Dsonar.projectKey=Eos-Dx_Bremen
            -Dsonar.projectName=Bremen

  docker-smoke:
    needs: test
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Docker hardening and private dependency image build are deferred to a later PR.
      # PR 0005 must not pass private keys into Docker build.
      # This job is visibility-only and non-blocking in PR 0005.
      - name: Build image for smoke test
        run: docker build -t bremen-ci-smoke:ci .

      - name: Run Docker smoke test
        run: |
          docker run --rm bremen-ci-smoke:ci \
            python -m pytest -q tests/test_bremen_import_identity.py
