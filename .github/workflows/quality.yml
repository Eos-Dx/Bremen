name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Configure GitHub token for private dependencies
        run: |
          test -n "${{ secrets.BREMEN_CI_GITHUB_TOKEN }}" || {
            echo "BREMEN_CI_GITHUB_TOKEN secret is missing"
            false
          }

          git config --global \
            url."https://x-access-token:${{ secrets.BREMEN_CI_GITHUB_TOKEN }}@github.com/".insteadOf \
            "https://github.com/"

          git config --global \
            url."https://x-access-token:${{ secrets.BREMEN_CI_GITHUB_TOKEN }}@github.com/".insteadOf \
            "ssh://git@github.com/"

          git config --global \
            url."https://x-access-token:${{ secrets.BREMEN_CI_GITHUB_TOKEN }}@github.com/".insteadOf \
            "git@github.com:"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip

          python -m pip install \
            "git+https://github.com/Eos-Dx/XRD-preprocessing.git"

          python -m pip install \
            "git+https://github.com/Eos-Dx/container.git@feat/v0_3-eoscan-session-container"

          python -m pip install .
          python -m pip install pytest-cov

      - name: Verify dependency imports
        run: |
          python - <<'PY'
          import xrd_preprocessing
          import container
          from container.registry import VERSION_REGISTRY

          print("xrd_preprocessing import OK")
          print("container import OK")
          print("container supported versions:", sorted(VERSION_REGISTRY.keys()))

          assert "0_3" in VERSION_REGISTRY, "VERSION_REGISTRY must contain 0_3"
          print("VERSION_REGISTRY contains 0_3: OK")
          PY

      - name: Compile check
        run: python -m compileall src tests

      - name: Run tests with coverage
        run: |
          python -m pytest \
            --cov=src/bremen \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80 \
            -q

      - name: SonarQube Cloud scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          args: |
            -Dsonar.python.coverage.reportPaths=coverage.xml
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Cleanup GitHub token config
        if: always()
        run: |
          git config --global --unset-all url."https://x-access-token:${{ secrets.BREMEN_CI_GITHUB_TOKEN }}@github.com/".insteadOf || true

