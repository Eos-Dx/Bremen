name: ECR Publish

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push runtime image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          BREMEN_CI_GITHUB_TOKEN: ${{ secrets.BREMEN_CI_GITHUB_TOKEN }}
        run: |
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}"

          docker build \
            --target production \
            --build-arg BREMEN_CI_GITHUB_TOKEN="${BREMEN_CI_GITHUB_TOKEN}" \
            -t "${IMAGE_URI}:${IMAGE_TAG}" \
            -t "${IMAGE_URI}:app-runner" \
            -t "${IMAGE_URI}:latest" \
            .

          docker push "${IMAGE_URI}:${IMAGE_TAG}"
          docker push "${IMAGE_URI}:app-runner"
          docker push "${IMAGE_URI}:latest"

  publish-training:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr-training
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push training image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr-training.outputs.registry }}
          ECR_REPOSITORY: bremen-training
          IMAGE_TAG: ${{ github.sha }}
          BREMEN_CI_GITHUB_TOKEN: ${{ secrets.BREMEN_CI_GITHUB_TOKEN }}
        run: |
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}"

          docker build \
            -f Dockerfile.training \
            --build-arg BREMEN_CI_GITHUB_TOKEN="${BREMEN_CI_GITHUB_TOKEN}" \
            -t "${IMAGE_URI}:${IMAGE_TAG}" \
            -t "${IMAGE_URI}:latest" \
            .

          docker push "${IMAGE_URI}:${IMAGE_TAG}"
          docker push "${IMAGE_URI}:latest"