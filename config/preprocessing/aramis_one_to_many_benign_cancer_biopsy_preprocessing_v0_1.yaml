# Aramis one-to-many BENIGN/CANCER biopsy-only preprocessing config.
# Purpose: stricter specimenId-level BENIGN/CANCER DataFrame containing only
# breast specimens marked as biopsy-confirmed in H5 metadata.
aramis_preprocessing:
  name: aramis_one_to_many_benign_cancer_biopsy_preprocessing
  version: 0.1
  product: Aramis
  clinical_stage: research draft
  branch: one_to_many
  decision_unit: specimenId
  row_unit: measurementId
  grouping_unit: specimenId
  cohort: biopsy_only

provenance:
  status: research draft product preprocessing config
  template: XRD-preprocessing/src/xrd_preprocessing/configs/preprocessing_branch_config_template.yaml
  agbh_config: Aramis/config/aramis_preprocessing_v0_1_config.json
  canonical_location: Aramis/config/preprocessing/aramis_one_to_many_benign_cancer_biopsy_preprocessing_v0_1.yaml
  fda_notebook_reference: Clinical_trials/Human_clinical_trial_model_FDA.py uses biopsy_flag == True for biopsy_only cohorts.
  used_by:
  - Aramis/examples/aramis_dataframe_one_to_many_v0_1.py
  - Aramis/src/aramis/pipelines.py
  documentation:
  - Aramis/config/README.md
  - Aramis/docs/data_preprocessing.md
  - Aramis/examples/README.md
  clinical_safety_note: Research draft decision-support preprocessing only; not for
    autonomous diagnosis.
xrd_preprocessing:
  version: local
  release_tag: v0.1.5-beta

io:
  input_h5_path: ../../../data/combined_archive.h5
  output_joblib_path: ../../examples/outputs/aramis_one_to_many_benign_cancer_biopsy_dataframe.joblib

raw_data:
  source: gfrm
  location: h5_blob
  allowed_sources:
  - gfrm
  - npy
  - tiff
  h5_dataset_candidates:
    gfrm:
    - raw_file
    - artifacts/gfrm
    npy:
    - raw/data
    - processed/data
    tiff:
    - raw/tiff
    - raw_file
metadata:
  keep: all
  # true keeps joblib lightweight. Set false for debug/export builds that need
  # all intermediate columns. Or keep selected payload/debug columns below.
  drop_payload_columns: true
  keep_payload_columns: []

# Biopsy filter runs at H5 metadata level before GFRM loading and again as a
# DataFrame safety filter after h5_to_df.
filters:
  quality_exclusions:
    enabled: true
    reason_doc: Aramis/docs/agbh_quality_exclusions.md
    primary_key:
      column: linked_agbh_session_uid
