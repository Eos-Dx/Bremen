# Aramis one-to-many preprocessing config.
# Purpose: build a research-draft specimenId-level BENIGN/CANCER DataFrame for
# comparing one breast specimen against breast specimens from other patients.
aramis_preprocessing:
  name: aramis_one_to_many_preprocessing
  version: 0.1
  product: Aramis
  clinical_stage: research draft
  branch: one_to_many
  decision_unit: specimenId
  row_unit: measurementId
  grouping_unit: specimenId

# Provenance links this concrete Aramis YAML to the reusable XRD-preprocessing
# template and to the AgBH monochromaticity JSON that supplies accepted dates.
provenance:
  status: research draft product preprocessing config
  template: XRD-preprocessing/src/xrd_preprocessing/configs/preprocessing_branch_config_template.yaml
  agbh_config: Aramis/config/aramis_preprocessing_v0_1_config.json
  canonical_location: Aramis/config/preprocessing/aramis_one_to_many_preprocessing_v0_1.yaml
  used_by:
  - Aramis/examples/aramis_dataframe_one_to_many_v0_1.py
  - Aramis/src/aramis/pipelines.py
  documentation:
  - Aramis/config/README.md
  - Aramis/docs/data_preprocessing.md
  - Aramis/examples/README.md
  clinical_safety_note: Research draft decision-support preprocessing only; not for
    autonomous diagnosis.
xrd_preprocessing:
  version: local
  release_tag: v0.1.3-beta

# Product source policy. GFRM is mandatory for real product data at this stage;
# NPY/TIFF are declared alternatives for controlled tests only.
raw_data:
  source: gfrm
  location: h5_blob
  allowed_sources:
  - gfrm
  - npy
  - tiff
  h5_dataset_candidates:
    gfrm:
    - raw_file
    - artifacts/gfrm
    npy:
    - raw/data
    - processed/data
    tiff:
    - raw/tiff
    - raw_file
metadata:
  keep: all
  drop_payload_columns: true

# H5-level filters run before GFRM loading. `accepted_dates` is intentionally
# empty here because notebooks/pipelines fill it from
# config/aramis_preprocessing_v0_1_config.json.
filters:
  accepted_dates: []
  measurement_positions:
  - P1
  - P2
  - P3
  required_q_max_nm_inv: 23.0
  require_sample_thickness_mm: true
  require_calibrant_thickness_mm: true
  calibrant_thickness_range_mm:
  - 10.0
  - 40.0
  thickness:
    sample:
      column: sample_thickness_mm
      require: true
      min_mm: 0.0
    calibrant:
      column: calibrant_thickness_mm
      require: true
      min_mm: 10.0
      max_mm: 40.0

# Label grouping is specimenId-level. NORMAL and NA are not part of this binary
# one-to-many dataset.
labels:
  grouping:
    BENIGN: BENIGN
    CANCER: CANCER
    ATYPICAL: CANCER
    PRE_CANCEROUS: CANCER
    NORMAL: NORMAL
    NA: exclude

# One-to-many branch rule: each specimen can stand alone after SNR/profile
# filtering; paired breast availability is not required here.
branch_settings:
  specimen_status_keep:
  - BENIGN
  - CANCER
  - ATYPICAL
  - PRE_CANCEROUS
  min_measurements_per_specimen_after_snr: 1

# Integration uses thickness correction. Sample and calibrant thickness columns
# must match the H5-level filter columns above.
integration:
  npt: 100
  q_range_nm_inv:
  - 2.0
  - 23.0
  error_model: poisson
  thickness_correction:
    enabled: true
    sample_thickness_column: sample_thickness_mm
    calibrant_thickness_column: calibrant_thickness_mm
    require_sample_thickness: true
    require_calibrant_thickness: true
    calibrant_thickness_range_mm:
    - 10.0
    - 40.0
snr:
  method: poisson
  min_snr_db: 18.0

# Normalize each radial profile by median value in 6.7..7.1 nm^-1.
# This keeps the typical intensity in the normalization window equal to 1.
normalization:
  mode: value
  statistic: median
  q_range_nm_inv:
  - 6.7
  - 7.1
  save_initial_data: false
profile_gate:
  q_nm_inv: 14.0
  min_value: 2.0
